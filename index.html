<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI/ML 研究分野 ナレッジグラフ</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #131826;
    --panel2: #1a2033;
    --border: #2a3550;
    --fg: #e0e0e0;
    --muted: #8090b0;
    --accent: #4A6CF7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg); color: var(--fg);
    font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
    overflow: hidden;
  }
  #app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .stats { color: var(--muted); font-size: 12px; margin-left: auto; }
  #search {
    padding: 6px 10px; background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; width: 240px;
    font-family: inherit; font-size: 13px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  #reset {
    padding: 6px 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #reset:hover { background: #5a7cff; }
  main { display: grid; grid-template-columns: 220px 1fr 320px; min-height: 0; }
  .sidebar {
    background: var(--panel); border-right: 1px solid var(--border);
    padding: 14px; overflow-y: auto; font-size: 12px;
  }
  .sidebar h3 {
    margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase;
    color: var(--muted); letter-spacing: 0.5px; font-weight: 600;
  }
  .sidebar .group { margin-bottom: 18px; }
  .filter-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    cursor: pointer; user-select: none;
  }
  .filter-item input { cursor: pointer; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  #network { background: var(--bg); position: relative; min-width: 0; min-height: 0; }
  .detail {
    background: var(--panel); border-left: 1px solid var(--border);
    padding: 16px; overflow-y: auto; font-size: 13px;
  }
  .detail h2 { margin: 8px 0 8px 0; font-size: 18px; font-weight: 600; line-height: 1.3; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; margin-right: 4px; margin-bottom: 4px;
  }
  .label { color: var(--muted); font-size: 11px; text-transform: uppercase; margin-top: 12px; margin-bottom: 4px; letter-spacing: 0.5px; }
  .desc { line-height: 1.6; color: #c8d0e0; font-size: 12px; white-space: pre-wrap; }
  .kw { display: inline-block; background: var(--panel2); padding: 2px 8px; border-radius: 10px; margin: 2px 4px 2px 0; font-size: 11px; }
  .related-item {
    padding: 6px 8px; margin: 2px 0; background: var(--panel2);
    border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  }
  .related-item:hover { background: #243049; }
  .strength { font-size: 10px; padding: 1px 6px; border-radius: 8px; }
  .strength-strong { background: #ffffff; color: #000; }
  .strength-medium { background: #888; color: #000; }
  .strength-weak { background: #555; color: #ddd; }
  .placeholder { color: var(--muted); font-size: 12px; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>AI/ML 研究分野 ナレッジグラフ</h1>
      <div class="sub">236 ノード / 564 エッジ / 2026-04-08</div>
    </div>
    <input id="search" type="text" placeholder="ノードを検索...">
    <button id="reset">リセット</button>
    <div class="stats" id="stats"></div>
  </header>
  <main>
    <aside class="sidebar">
      <div class="group">
        <h3>カテゴリ</h3>
        <div id="cat-filters"></div>
      </div>
      <div class="group">
        <h3>エッジ強度</h3>
        <div id="edge-filters">
          <label class="filter-item"><input type="checkbox" data-strength="strong" checked><span class="swatch" style="background:#fff"></span>strong</label>
          <label class="filter-item"><input type="checkbox" data-strength="medium" checked><span class="swatch" style="background:#888"></span>medium</label>
          <label class="filter-item"><input type="checkbox" data-strength="weak" checked><span class="swatch" style="background:#555"></span>weak</label>
        </div>
      </div>
      <div class="group">
        <h3>操作</h3>
        <div class="placeholder">
          ドラッグ: 移動<br>
          ホイール: ズーム<br>
          クリック: 詳細表示<br>
          ホバー: 名前表示
        </div>
      </div>
    </aside>
    <div id="network"></div>
    <aside class="detail" id="detail">
      <div class="placeholder">ノードをクリックすると詳細が表示されます。</div>
    </aside>
  </main>
</div>

 Banana Pro", "Gemini Image", "Gemini 2.5 Flash Image", "4K image generation"], "color": "#EC4899", "size": 14.7, "degree": 6, "related": [{"id": "t_04_01_09_inpainting", "name": "インペインティング・画像編集", "strength": "strong"}, {"id": "t_04_01_04_flux", "name": "Flux", "strength": "medium"}, {"id": "t_04_01_02_dall_e", "name": "DALL-E", "strength": "medium"}, {"id": "t_04_01_03_midjourney", "name": "Midjourney", "strength": "medium"}, {"id": "t_04_05_06_autoregressive", "name": "自己回帰モデル", "strength": "weak"}]}, {"id": "t_04_01_06_instruction_based_image_editing", "label": "指示型画像編集モデル（Flux Kontext / Qwen-Image-Edit / SeedEdit）", "title": "指示型画像編集モデル（Flux Kontext / Qwen-Image-Edit / SeedEdit）", "category": "生成AI", "subcategory": "画像生成", "description": "自然言語の指示に従って既存画像をピクセル単位で精緻に編集する新カテゴリのモデル群で、2025 年に確立した。従来の Inpainting がマスク領域の再生成に限られていたのに対し、これらのモデルはマスク不要で「背景はそのまま、人物のシャツだけ青に変える」「テーブルの上にコップを追加する」等の複雑な編集指示を一発で実行する。代表モデルは Black Forest Labs の **Flux.1 Kontext [pro] / [dev]**、Alibaba の **Qwen-Image-Edit**（オープンウェイト）、ByteDance の **SeedEdit / SeedEdit 3.0** であり、いずれも instruction-following とアイデンティティ保持の両立を主眼に学習されている。Nano Banana と並んで指示型編集ベンチマークで高スコアを記録し、Adobe Photoshop・Canva・Figma 等のクリエイティブソフトウェアへの組み込みが急速に進んでいる。プロの画像編集ワークフローを根底から変えつつあるカテゴリで、2025〜2026 年の画像生成領域で最も活発な研究・製品開発分野の一つとなっている。", "keywords": ["instruction-based image editing", "Flux Kontext", "Qwen-Image-Edit", "SeedEdit", "mask-free editing"], "color": "#EC4899", "size": 13.3, "degree": 5, "related": [{"id": "t_04_01_09_inpainting", "name": "インペインティング・画像編集", "strength": "strong"}, {"id": "t_04_01_04_flux", "name": "Flux", "strength": "strong"}, {"id": "t_04_01_05_nano_banana", "name": "Nano Banana / Nano Banana Pro", "strength": "medium"}, {"id": "t_04_01_07_controlnet", "name": "ControlNet", "strength": "medium"}, {"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "weak"}]}, {"id": "t_04_01_07_controlnet", "label": "ControlNet", "title": "ControlNet", "category": "生成AI", "subcategory": "画像生成", "description": "拡散モデルに構造的な条件（ポーズ、エッジ、深度マップ、セグメンテーション等）を付与して生成画像を精密に制御する手法で、2023年にLvmin Zhangらにより提案された。事前学習済み拡散モデルのエンコーダ部分を複製し、ゼロ畳み込みで接続することで、元のモデルの能力を損なわずに条件付き生成を実現する。Canny Edge、OpenPose、Depth、Scribble等の多様な条件タイプに対応し、複数のControlNetを同時適用することも可能である。2025年現在、ControlNet 1.1やSD3/SDXL対応版が広く普及し、IP-Adapter・LoRAとの組み合わせにより極めて柔軟な生成制御パイプラインが構築可能になっている。建築ビジュアライゼーション、ファッションデザイン、アニメ制作など、構図やレイアウトの精密な制御が求められる実務用途で不可欠な技術となっている。生成AIを「創造的ツール」として実用化する上で、ControlNetの登場は決定的な転換点であった。", "keywords": ["ControlNet", "conditional generation", "pose", "edge", "depth"], "color": "#EC4899", "size": 13.3, "degree": 5, "related": [{"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "strong"}, {"id": "t_04_01_08_ip_adapter", "name": "IP-Adapter", "strength": "medium"}, {"id": "t_04_01_09_inpainting", "name": "インペインティング・画像編集", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "weak"}]}, {"id": "t_04_01_08_ip_adapter", "label": "IP-Adapter", "title": "IP-Adapter", "category": "生成AI", "subcategory": "画像生成", "description": "参照画像のスタイルや被写体情報を保持しながら新しい画像を生成するアダプタ技術で、テキストと画像の両方を条件として同時に利用できる。Tencent AIラボが2023年に発表し、Decoupled Cross-Attentionにより画像特徴をテキスト特徴と分離して注入する設計が特徴である。画像プロンプティングにより、参照画像のスタイル転写、被写体の一貫性維持、顔の類似性保持など多様なユースケースに対応する。IP-Adapter FaceID、IP-Adapter Plus等のバリアントが存在し、用途に応じた精度チューニングが可能である。2025年にはControlNetやLoRAとの併用パイプラインが標準化し、キャラクターの一貫性を保つ商業イラスト制作やブランドビジュアルの統一に広く利用されている。Subject-Driven Generationの実用化を牽引した技術であり、パーソナライズされた画像生成の基盤として重要な位置を占める。", "keywords": ["IP-Adapter", "image prompt", "style transfer", "subject-driven generation"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "strong"}, {"id": "t_04_01_07_controlnet", "name": "ControlNet", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "weak"}]}, {"id": "t_04_01_09_inpainting", "label": "インペインティング・画像編集", "title": "インペインティング・画像編集", "category": "生成AI", "subcategory": "画像生成", "description": "画像の一部を選択的に修正・補完・拡張する技術群の総称で、マスク指定による部分再生成（Inpainting）、画像領域の拡張（Outpainting）、テキスト指示による意味的な画像編集を包含する。古典的な画像補完技術はPatchMatchやテクスチャ合成に基づいていたが、拡散モデルの登場により文脈を理解した高品質な補完が可能になった。InstructPix2Pix（2023年）は自然言語指示による画像編集を実現し、その後BrushNet、PowerPaint、DALL-E の編集機能等が続いた。2025年現在、Adobeの生成塗りつぶし（Generative Fill）をはじめ、商用ソフトウェアへの統合が本格化しており、プロの画像編集ワークフローに不可欠な技術となっている。リアルタイムインペインティングやビデオインペインティングへの拡張も進み、映像制作・Eコマース・建築デザイン等の実務で広く活用されている。", "keywords": ["inpainting", "outpainting", "image editing", "InstructPix2Pix"], "color": "#EC4899", "size": 14.7, "degree": 6, "related": [{"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "strong"}, {"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "medium"}, {"id": "t_04_01_07_controlnet", "name": "ControlNet", "strength": "medium"}]}, {"id": "t_04_02_01_sora", "label": "Sora", "title": "Sora", "category": "生成AI", "subcategory": "動画生成", "description": "OpenAI が開発した動画生成モデルで、拡散トランスフォーマー（DiT）アーキテクチャにより、テキストから物理法則を理解した高品質で一貫性のある動画を生成できる。時空間パッチを扱うことで可変解像度・可変長の動画生成に対応し、「ワールドシミュレーター」としての側面も持つ。2024 年 2 月にデモ公開、同年末に Sora Turbo として一般公開された後、**2025 年 9 月 30 日に大幅刷新版の Sora 2 がリリース** され、ネイティブな同期音声生成（環境音・効果音・キャラクター発話のリップシンク）と最大 15〜25 秒の動画生成、物理整合性の大幅向上、リミックス機能を実現した。専用の Sora アプリ（iOS）が同時公開され短期間で爆発的にユーザーを獲得したが、法的・著作権問題と運用負荷から **2026 年 3 月に OpenAI は Sora アプリの廃止を発表（4 月終了予定）** し、機能は ChatGPT 本体および API に統合される方針が示された。動画生成を「次のフロンティア」として位置づけ、業界全体の研究開発競争を加速させた歴史的モデルである一方、同期音声・物理理解・倫理運用という領域の難しさを示す象徴的事例ともなった。", "keywords": ["Sora", "Sora 2", "Sora Turbo", "OpenAI", "video generation", "diffusion transformer", "synchronized audio"], "color": "#EC4899", "size": 14.7, "degree": 6, "related": [{"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "strong"}, {"id": "t_04_06_02_world_model", "name": "ワールドモデル", "strength": "strong"}, {"id": "t_04_02_03_runway", "name": "Runway", "strength": "medium"}, {"id": "t_04_02_04_pika", "name": "Pika / Kling", "strength": "medium"}, {"id": "t_04_02_02_veo", "name": "Veo / Veo 3 / Veo 3.1", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "medium"}]}, {"id": "t_04_02_02_veo", "label": "Veo / Veo 3 / Veo 3.1", "title": "Veo / Veo 3 / Veo 3.1", "category": "生成AI", "subcategory": "動画生成", "description": "Google DeepMind が開発した動画生成モデル系譜で、Imagen Video・Lumiere の流れを汲む。**Veo 2（2024 年末）** で 4K 解像度・物理理解の強化を達成した後、**2025 年 5 月の Google I/O で Veo 3 が発表** され、業界初のネイティブ同期音声生成（環境音・効果音・ダイアログのリップシンク）を Sora 2 より約 4 ヶ月先行して実現した。同年後半には品質と制御性をさらに高めた **Veo 3.1** が登場し、最大 1080p・8 秒（連結で 60 秒以上）の生成、参照画像によるキャラクター一貫性、シーンエクステンション機能を備える。Vertex AI、Gemini アプリ、YouTube Shorts の Dream Screen、Google Workspace 等から提供され、企業向け・コンシューマ向けの双方で広く展開されている。Sora 2・Runway Gen-4.5 と並ぶ動画生成「三強」の一角として、現時点で最も商用導入が進んでいるモデル群の一つであり、特にネイティブ音声生成と物理整合性の両立で先頭を走っている。", "keywords": ["Veo", "Veo 2", "Veo 3", "Veo 3.1", "Google DeepMind", "native audio", "Vertex AI", "video generation"], "color": "#EC4899", "size": 14.7, "degree": 6, "related": [{"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "strong"}, {"id": "t_04_06_02_world_model", "name": "ワールドモデル", "strength": "strong"}, {"id": "t_04_02_01_sora", "name": "Sora", "strength": "medium"}, {"id": "t_04_02_03_runway", "name": "Runway", "strength": "medium"}, {"id": "t_04_02_04_pika", "name": "Pika / Kling", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "medium"}]}, {"id": "t_04_02_03_runway", "label": "Runway", "title": "Runway", "category": "生成AI", "subcategory": "動画生成", "description": "Gen-1 から Gen-4.5 に至る動画生成モデルを提供するクリエイティブ AI プラットフォームで、映像制作ワークフローに統合しやすい Web ベースの UI が特徴である。2018 年設立の同社は「AI for creativity」をビジョンに掲げ、動画生成 AI の商用化を先導してきたパイオニア企業である。Gen-2（2023 年）、Gen-3 Alpha（2024 年）を経て、**2025 年 3 月 31 日に Gen-4 がリリース**され、キャラクター・オブジェクトの一貫性とシーン横断の連続性が劇的に改善された。続いて **2025 年 12 月 1 日に Gen-4.5 がリリース** され、Artificial Analysis の Video Arena でブラインド評価 1 位を獲得、Sora 2 や Veo 3 を上回るユーザー選好を記録した。Motion Brush、カメラコントロール、リップシンク、Act-Two（パフォーマンス転写）等のきめ細かい制御機能を提供し、ハリウッド映画や CM の制作プロセスに組み込まれる事例が増加している。Runway の国際映画祭（AIFF）の開催など、AI 映像表現のエコシステム構築にも貢献している。", "keywords": ["Runway", "Gen-3", "Gen-4", "Gen-4.5", "video generation", "Video Arena", "creative tools"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_02_01_sora", "name": "Sora", "strength": "medium"}, {"id": "t_04_02_04_pika", "name": "Pika / Kling", "strength": "medium"}, {"id": "t_04_02_02_veo", "name": "Veo / Veo 3 / Veo 3.1", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "medium"}]}, {"id": "t_04_02_04_pika", "label": "Pika / Kling", "title": "Pika / Kling", "category": "生成AI", "subcategory": "動画生成", "description": "Pika は手軽な動画生成・編集ツールとしてスタンフォード出身のチームが開発し、Kling は中国の快手（Kuaishou）が開発した高品質動画生成モデルである。Pika 1.x（2023〜2024 年）はシンプルな UI とリップシンク・サウンドエフェクト付き動画生成で急速にユーザーを獲得した後、**Pika 2.0 / 2.1 / 2.2（2024 年末〜2025 年）** で Pikaframes（キーフレーム間補間）、Pikaffects（特殊効果）、最大 1080p・10 秒生成等を実現し、コンシューマ向け短尺動画市場で確固たる地位を築いた。Kling は **Kling 1.5 → Kling 2.0（2025 年 4 月）→ Kling 2.1（2025 年 5 月）** へと急速に進化し、3D 時空間アテンションと自社開発の DiT により物理整合性・モーション品質で世界トップクラスに到達、Artificial Analysis の Video Arena でも上位常連となった。Sora 2・Veo 3・Runway Gen-4.5 を含む五強体制が形成され、動画生成市場の競争は一層激化している。両モデルとも消費者向け・クリエイター向けの異なるセグメントで強みを発揮し、動画生成 AI の大衆化を推進している。", "keywords": ["Pika", "Pika 2.x", "Kling", "Kling 2.0", "Kling 2.1", "Kuaishou", "video generation"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_02_01_sora", "name": "Sora", "strength": "medium"}, {"id": "t_04_02_03_runway", "name": "Runway", "strength": "medium"}, {"id": "t_04_02_02_veo", "name": "Veo / Veo 3 / Veo 3.1", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "medium"}]}, {"id": "t_04_02_05_video_editing", "label": "動画編集・モーション転写", "title": "動画編集・モーション転写", "category": "生成AI", "subcategory": "動画生成", "description": "既存動画のスタイル変換、モーション転写（あるキャラクタの動きを別キャラクタに適用）、フレーム補間、動画のリタイミング等を含むAI動画後処理技術群の総称である。MotionCtrl、DragAnything、VideoComposer等の研究が基盤となり、参照動画から動きのパターンを抽出して別の被写体に転写する技術が急速に発展した。従来はモーションキャプチャ装置や手動キーフレーム設定が必要だった工程が、AIにより大幅に自動化されている。2025年にはリアルタイム処理が可能なモデルも登場し、ライブ配信やインタラクティブコンテンツへの応用も始まっている。映画のVFX、ゲーム開発、バーチャルYouTuber、広告制作など幅広い領域で活用され、映像制作のコストと時間を劇的に削減している。生成AIと既存映像編集ツールの統合が進み、プロ向けソフトウェア（Premiere Pro、DaVinci Resolve等）へのAI機能組み込みも加速している。", "keywords": ["video editing", "motion transfer", "style transfer", "frame interpolation"], "color": "#EC4899", "size": 16.0, "degree": 7, "related": [{"id": "t_04_02_01_sora", "name": "Sora", "strength": "medium"}, {"id": "t_04_02_03_runway", "name": "Runway", "strength": "medium"}, {"id": "t_04_02_04_pika", "name": "Pika / Kling", "strength": "medium"}, {"id": "t_04_01_07_controlnet", "name": "ControlNet", "strength": "weak"}, {"id": "t_04_06_02_world_model", "name": "ワールドモデル", "strength": "weak"}, {"id": "t_04_01_08_ip_adapter", "name": "IP-Adapter", "strength": "weak"}]}, {"id": "t_04_03_01_tts", "label": "テキスト音声合成（TTS）", "title": "テキスト音声合成（TTS）", "category": "生成AI", "subcategory": "音声・音楽生成", "description": "テキストから自然な音声を合成する技術で、ディープラーニングの発展により人間と区別がつかないレベルの音声品質を実現している。初期のTTSは連結合成やパラメトリック合成が主流だったが、WaveNet（2016年）・Tacotron（2017年）を経て、ニューラルTTSが主流となった。VALL-E（2023年、Microsoft）は3秒の参照音声からゼロショットで高品質な音声合成を実現し、TTS技術のパラダイムシフトを起こした。Bark、Coqui TTS、Parler-TTS等のオープンソースモデルも充実し、感情制御・多言語対応・リアルタイム生成が可能になっている。2025年現在、ElevenLabsやPlay.ht等の商用サービスが急成長し、オーディオブック、ポッドキャスト、カスタマーサポート、アクセシビリティ支援等で広く実用化されている。音声クローニングやマルチモーダルAIとの統合が進み、パーソナライズされた音声インターフェースの実現が近づいている。", "keywords": ["TTS", "text-to-speech", "VALL-E", "Bark", "Coqui", "zero-shot voice"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_03_02_voice_cloning", "name": "音声クローニング", "strength": "strong"}, {"id": "t_04_05_06_autoregressive", "name": "自己回帰モデル", "strength": "medium"}, {"id": "t_04_03_03_suno", "name": "音楽生成（Suno / Udio）", "strength": "weak"}, {"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "weak"}]}, {"id": "t_04_03_02_voice_cloning", "label": "音声クローニング", "title": "音声クローニング", "category": "生成AI", "subcategory": "音声・音楽生成", "description": "少量の音声サンプルから特定話者の声質・韻律・話し方を再現する技術で、パーソナライズされた音声体験の基盤となっている。従来の話者適応技術は数十分から数時間の録音データが必要だったが、VALL-E等のゼロショット手法の登場により、わずか数秒の参照音声でクローニングが可能になった。話者埋め込み（Speaker Embedding）を利用したアプローチと、プロンプトベースの文脈内学習アプローチの2つの技術的潮流がある。2025年現在、ElevenLabs、Resemble AI、Descript等の商用プラットフォームが高品質な音声クローニングサービスを提供し、コンテンツ制作の効率化に貢献している。一方で、ディープフェイク音声による詐欺やなりすましのリスクが社会問題化しており、音声透かし・検出技術の開発や法規制の整備が各国で進んでいる。エンターテインメント、教育、医療（ALS患者の音声保存等）など、倫理的に適切な利用における社会的意義は非常に大きい。", "keywords": ["voice cloning", "speaker adaptation", "few-shot voice synthesis"], "color": "#EC4899", "size": 9.3, "degree": 2, "related": [{"id": "t_04_03_01_tts", "name": "テキスト音声合成（TTS）", "strength": "strong"}, {"id": "t_04_03_04_sound_effects", "name": "効果音生成", "strength": "weak"}]}, {"id": "t_04_03_03_suno", "label": "音楽生成（Suno / Udio）", "title": "音楽生成（Suno / Udio）", "category": "生成AI", "subcategory": "音声・音楽生成", "description": "テキストプロンプトからボーカル・楽器・ミキシングを含むフルトラック楽曲を生成するサービスで、音楽制作の民主化を急速に推進している。Meta の MusicGen（2023 年）以降、Suno と Udio がボーカル付きの完全な楽曲生成を可能にし、非音楽家でも曲を作れる時代が到来した。**Suno は 2025 年 9 月に v5 をリリース** し、商業品質の音質・歌唱表現・楽器分離に到達、続いて **2026 年 3 月の v5.5 では Voice Capture（ユーザー自身の歌声を学習させて使う機能）と Custom Models（パーソナル微調整モデル）** を搭載し、クリエイター個人のスタイルを保持した生成が可能になった。Warner Music Group は 2025 年に Suno と公式ライセンス契約を締結し、合法的な学習データ利用への道筋を示した。一方 **Udio は Universal Music Group との訴訟を 2025 年に和解し、ライセンス型のサービスに転換**、同年 10 月以降は生成物のダウンロード機能を停止しストリーミング中心の運用に移行した。著作権問題は依然として大きな論点だが、業界とのライセンス締結による「合法化」が進行中であり、BGM 制作・プロトタイピング・教育・パーソナライズド音楽体験などで実用的な価値を発揮している。", "keywords": ["Suno", "Suno v5", "Suno v5.5", "Voice Capture", "Udio", "UMG", "Warner Music", "music generation"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_05_06_autoregressive", "name": "自己回帰モデル", "strength": "medium"}, {"id": "t_04_03_04_sound_effects", "name": "効果音生成", "strength": "medium"}, {"id": "t_04_03_01_tts", "name": "テキスト音声合成（TTS）", "strength": "weak"}]}, {"id": "t_04_03_04_sound_effects", "label": "効果音生成", "tit 融大手における AI エンジニア導入の象徴的事例となり、エンタープライズ AIDD の流れを決定づけた。Windsurf（旧 Codeium）や Amazon Q Developer 等の競合も台頭し、AI 統合開発環境市場は急速に拡大している。これらのツールは「AI がコードを書き、人間がレビュー・方向づけする」という新しい開発パラダイムを現実のものとしている。", "keywords": ["Cursor", "Devin", "Devin 2.2", "Cognition", "Goldman Sachs", "autonomous software engineer", "computer use"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_04_04_aidd", "name": "AI駆動開発（AIDD）", "strength": "strong"}, {"id": "t_04_04_01_github_copilot", "name": "GitHub Copilot", "strength": "medium"}, {"id": "t_04_04_02_claude_code", "name": "Claude Code", "strength": "medium"}]}, {"id": "t_04_04_04_aidd", "label": "AI駆動開発（AIDD）", "title": "AI駆動開発（AIDD）", "category": "生成AI", "subcategory": "コード生成", "description": "AIをソフトウェア開発プロセスの中核に据え、設計・実装・テスト・レビュー・ドキュメント作成の各工程でAIエージェントを積極的に活用する開発手法論である。従来のAI支援開発（AIがアシスタント役）から進化し、AIが主体的にコードを生成・修正し、人間が方向づけ・レビュー・品質保証を担う役割分担を特徴とする。GitHub Copilot、Claude Code、Cursor等のツール成熟を背景に、2024年から2025年にかけて企業での実践事例が急増している。Anthropicが提唱する3エージェント体制（Orchestrator・Specialist・Reviewer）やMCPによるツール統合等、AIDD固有のアーキテクチャパターンも確立されつつある。2025年現在、AIDDの導入により開発速度が2〜10倍に向上する事例が報告される一方、AIが生成するコードの品質保証・セキュリティ・知的財産権等の課題も議論されている。ソフトウェア開発の根本的なパラダイムシフトとして、今後数年で業界標準になると予測されている。", "keywords": ["AIDD", "AI-driven development", "agentic development", "AI-first workflow"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_04_02_claude_code", "name": "Claude Code", "strength": "strong"}, {"id": "t_04_04_03_cursor", "name": "Cursor / Devin", "strength": "strong"}, {"id": "t_04_04_01_github_copilot", "name": "GitHub Copilot", "strength": "medium"}]}, {"id": "t_04_05_01_diffusion_model", "label": "拡散モデル（DDPM / DDIM）", "title": "拡散モデル（DDPM / DDIM）", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "データに段階的にガウスノイズを加える拡散過程と、そのノイズを逆方向に除去して元データを復元する逆過程を学習することで生成を行う確率的生成モデルである。理論的基礎は2015年のSohl-Dicksteinらの研究に遡るが、2020年のDDPM（Ho et al.）がシンプルな学習目的関数とU-Netアーキテクチャで画像生成品質を劇的に向上させ、実用化の道を開いた。DDIM（2020年）は決定論的サンプリングにより推論を高速化し、Classifier-Free Guidance（2022年）はテキスト条件付き生成の品質を大幅に改善した。Score Matching、確率微分方程式（SDE/ODE）との理論的統合により、拡散モデルの数学的基盤も整備されている。2025年現在、画像・動画・音声・3D・分子設計等の多領域で基盤技術として君臨し、DiT（Diffusion Transformer）やFlow Matchingへの発展も含め、生成AI全体のアーキテクチャ的支柱となっている。GANの学習不安定性やVAEの生成品質の限界を克服した点で、生成モデル研究における最大のブレイクスルーの一つとされる。", "keywords": ["diffusion model", "DDPM", "DDIM", "denoising", "score matching"], "color": "#EC4899", "size": 24.0, "degree": 13, "related": [{"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "strong"}, {"id": "t_04_01_02_dall_e", "name": "DALL-E", "strength": "strong"}, {"id": "t_04_02_01_sora", "name": "Sora", "strength": "strong"}, {"id": "t_04_02_02_veo", "name": "Veo / Veo 3 / Veo 3.1", "strength": "strong"}, {"id": "t_04_05_04_consistency_models", "name": "Consistency Models", "strength": "strong"}, {"id": "t_04_01_03_midjourney", "name": "Midjourney", "strength": "medium"}, {"id": "t_04_01_09_inpainting", "name": "インペインティング・画像編集", "strength": "medium"}, {"id": "t_04_05_02_flow_matching", "name": "Flow Matching", "strength": "medium"}, {"id": "t_04_05_03_rectified_flow", "name": "Rectified Flow", "strength": "medium"}, {"id": "t_04_05_05_vae", "name": "VAE / GAN", "strength": "medium"}, {"id": "t_04_06_01_text_to_3d", "name": "3D生成・テクスチャ生成", "strength": "medium"}, {"id": "t_04_03_01_tts", "name": "テキスト音声合成（TTS）", "strength": "weak"}, {"id": "t_04_03_04_sound_effects", "name": "効果音生成", "strength": "weak"}]}, {"id": "t_04_05_02_flow_matching", "label": "Flow Matching", "title": "Flow Matching", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "連続正規化フロー（CNF）を効率的に学習するための手法で、ノイズ分布からデータ分布への確率的な輸送経路を最適化する。Lipmanら（2023年）が提案したFlow Matchingは、従来のCNF学習で必要だった計算コストの高いODEソルバーを回避し、単純な回帰損失で学習できる点が画期的であった。Optimal Transport条件付きFlow Matchingにより、ノイズからデータへの経路がほぼ直線的となり、少ないステップ数での高品質生成を可能にする。拡散モデルの特殊ケースとしてDDPM/DDIMを包含する一般的なフレームワークであり、理論的な統一性も優れている。2025年現在、FluxやStable Diffusion 3がFlow Matchingベースのアーキテクチャを採用し、実用面でも拡散モデルの次世代標準として急速に普及している。Rectified Flow、Stochastic Interpolantsなどの関連手法も活発に研究され、画像・動画・音声・タンパク質構造予測等の幅広い領域で応用が広がっている。", "keywords": ["Flow Matching", "Continuous Normalizing Flow", "optimal transport"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_01_04_flux", "name": "Flux", "strength": "strong"}, {"id": "t_04_05_03_rectified_flow", "name": "Rectified Flow", "strength": "strong"}, {"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "medium"}, {"id": "t_04_05_04_consistency_models", "name": "Consistency Models", "strength": "medium"}]}, {"id": "t_04_05_03_rectified_flow", "label": "Rectified Flow", "title": "Rectified Flow", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "Liu et al.（2022 年）が提案した、ノイズ分布とデータ分布を結ぶ常微分方程式（ODE）の経路を可能な限り「直線化（rectify）」する学習手法で、Flow Matching ファミリーの中でも特に実用性に優れたバリアントである。Reflow と呼ばれる繰り返し蒸留により、生成軌道を段階的に直線へと近づけることで、推論ステップ数を大幅に削減しつつ高品質生成を維持する。理論的には Optimal Transport の近似であり、Flow Matching の一般枠組みの中で「最も直線に近い経路」を学習する具体策と位置づけられる。**Stable Diffusion 3 / SD3.5、Flux.1 全シリーズ、Mochi-1 等の動画生成モデル、Lumina-T2X 等のマルチモーダル生成モデル** が事実上の標準アーキテクチャとして Rectified Flow を採用しており、2025 年時点で次世代生成モデルの基盤となっている。少ステップ生成・蒸留・リアルタイム生成との親和性が高く、Consistency Models との組み合わせによる超高速生成（1〜4 ステップ）の研究も活発である。Flow Matching の理論的優雅さを実用的な推論効率へ橋渡しした点で、生成アーキテクチャ研究の重要なマイルストーンとなっている。", "keywords": ["Rectified Flow", "Reflow", "ODE straightening", "SD3", "Flux", "Mochi"], "color": "#EC4899", "size": 13.3, "degree": 5, "related": [{"id": "t_04_05_02_flow_matching", "name": "Flow Matching", "strength": "strong"}, {"id": "t_04_01_04_flux", "name": "Flux", "strength": "strong"}, {"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "strong"}, {"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "medium"}, {"id": "t_04_05_04_consistency_models", "name": "Consistency Models", "strength": "medium"}]}, {"id": "t_04_05_04_consistency_models", "label": "Consistency Models", "title": "Consistency Models", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "拡散モデルの多段推論プロセスを1ステップまたは少数ステップに蒸留し、生成速度を劇的に改善する手法で、Song et al.（OpenAI, 2023年）により提案された。ODE軌道上の任意の点から同じ始点（生成結果）にマッピングする「自己一貫性」の性質を学習することで、単一ステップでの高品質生成を実現する。蒸留型（Consistency Distillation）と直接学習型（Consistency Training）の2つのアプローチがあり、前者は既存の拡散モデルからの知識転移、後者は独立した学習が可能である。2024年にはImproved Consistency Training（iCT）やLatent Consistency Models（LCM）が登場し、品質と速度のトレードオフがさらに改善された。2025年現在、リアルタイム画像生成（SDXL-Turbo、LCM-LoRA等）やインタラクティブな画像編集の基盤技術として広く採用されている。推論コストの削減はエッジデバイスでの生成AI実行にも直結し、モバイルやIoT領域への生成AI展開を加速させている。", "keywords": ["Consistency Models", "distillation", "single-step generation"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "strong"}, {"id": "t_04_05_02_flow_matching", "name": "Flow Matching", "strength": "medium"}, {"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "medium"}]}, {"id": "t_04_05_05_vae", "label": "VAE / GAN", "title": "VAE / GAN", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "VAE（変分オートエンコーダ）は潜在空間を通じた確率的生成モデル、GAN（敵対的生成ネットワーク）は生成器と識別器の敵対学習による生成モデルであり、拡散モデル以前の深層生成モデルの2大主流であった。VAEはKingma & Welling（2013年）が提案し、変分推論に基づく明示的な尤度最大化で安定した学習が可能だが、生成画像がぼやける傾向がある。GANはGoodfellow et al.（2014年）が提案し、シャープで高品質な画像を生成できる反面、モード崩壊や学習不安定性が課題であった。StyleGAN（NVIDIA）シリーズは顔画像生成で驚異的な品質を達成し、GANの最高到達点を示した。2025年現在、単体での画像生成では拡散モデルに主役の座を譲ったものの、Stable Diffusionの潜在空間エンコーダ（VAE）やGANベースの超解像・リアルタイム生成など、ハイブリッドアーキテクチャの重要コンポーネントとして不可欠な役割を担い続けている。生成モデルの理論的基盤として、拡散モデルやFlow Matchingの発展にも知的貢献を果たした歴史的に重要なモデル群である。", "keywords": ["VAE", "GAN", "variational autoencoder", "generative adversarial network"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "medium"}, {"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "medium"}, {"id": "t_04_05_06_autoregressive", "name": "自己回帰モデル", "strength": "weak"}]}, {"id": "t_04_05_06_autoregressive", "label": "自己回帰モデル", "title": "自己回帰モデル", "category": "生成AI", "subcategory": "生成アーキテクチャ", "description": "トークンを逐次的に予測して系列を生成する手法で、次トークン予測（Next Token Prediction）という単純な原理に基づく強力な生成パラダイムである。GPTシリーズに代表されるLLM（大規模言語モデル）の基盤技術であり、テキスト生成においては圧倒的な支配的地位を占める。画像領域ではVQ-VAE + Transformerの組み合わせ（DALL-E初代）や、最近のVisual Autoregressive Models（VAR, LlamaGen等）により、拡散モデルに匹敵する画像生成品質を達成している。音声生成（VALL-E、Bark）やコード生成（Codex、StarCoder）にも広く応用され、モダリティを問わない統一的な生成フレームワークとしての地位を確立している。2025年現在、テキスト・画像・音声・動画を単一の自己回帰モデルで生成するAny-to-Any型マルチモーダルモデル（GPT-4o、Gemini等）が主要トレンドとなっている。スケーリング則（Scaling Laws）に従い、モデルサイズとデータ量の増大に伴って予測可能な性能向上が得られる点も、産業応用における大きな利点である。", "keywords": ["autoregressive", "next-token prediction", "VQ-VAE", "visual autoregressive"], "color": "#EC4899", "size": 16.0, "degree": 7, "related": [{"id": "t_04_03_01_tts", "name": "テキスト音声合成（TTS）", "strength": "medium"}, {"id": "t_04_03_03_suno", "name": "音楽生成（Suno / Udio）", "strength": "medium"}, {"id": "t_04_01_02_dall_e", "name": "DALL-E", "strength": "medium"}, {"id": "t_04_04_01_github_copilot", "name": "GitHub Copilot", "strength": "medium"}, {"id": "t_04_04_02_claude_code", "name": "Claude Code", "strength": "medium"}, {"id": "t_04_05_05_vae", "name": "VAE / GAN", "strength": "weak"}]}, {"id": "t_04_06_01_text_to_3d", "label": "3D生成・テクスチャ生成", "title": "3D生成・テクスチャ生成", "category": "生成AI", "subcategory": "3D生成・ワールドモデル", "description": "テキストや2D画像から3Dモデル（メッシュ、NeRF、3Dガウシアン等）を自動生成する技術群で、3Dコンテンツ制作の劇的な効率化を目指している。DreamFusion（Google, 2022年）がScore Distillation Sampling（SDS）により2D拡散モデルの知識を3D生成に転用する手法を確立し、この分野の研究を一気に活性化させた。TripoSR（2024年）やInstantMesh（2024年）はフィードフォワード型の高速3D復元を実現し、生成速度を大幅に改善した。テクスチャ生成（TEXTure, Paint3D等）やPBRマテリアルの自動生成も含め、3Dアセット制作パイプライン全体のAI化が進んでいる。2025年現在、Meshy、Tripo、Rodin等の商用プラットフォームが3D生成サービスを提供し、ゲーム開発・Eコマース・建築・XR（VR/AR）等の領域で実用化が加速している。3Dガウシアンスプラッティングの普及やマルチビュー拡散モデルの発展により、生成品質と速度の両面で急速な進歩が続いている。", "keywords": ["text-to-3D", "DreamFusion", "TripoSR", "3D reconstruction", "texture generation"], "color": "#EC4899", "size": 10.7, "degree": 3, "related": [{"id": "t_04_05_01_diffusion_model", "name": "拡散モデル（DDPM / DDIM）", "strength": "medium"}, {"id": "t_04_06_02_world_model", "name": "ワールドモデル", "strength": "medium"}, {"id": "t_04_01_01_stable_diffusion", "name": "Stable Diffusion", "strength": "weak"}]}, {"id": "t_04_06_02_world_model", "label": "ワールドモデル", "title": "ワールドモデル", "category": "生成AI", "subcategory": "3D生成・ワールドモデル", "description": "環境の物理法則、オブジェクトのダイナミクス、因果関係を学習し、将来状態を予測・シミュレーションするモデルで、「世界の内部モデル」を構築するアプローチである。概念的にはHa & Schmidhuber（2018年）の「World Models」論文に端を発し、環境をコンパクトな潜在空間で表現して予測・計画に活用するフレームワークを提案した。Genie（Google DeepMind, 2024年）はインターネット動画から学習したインタラクティブな仮想環境生成を実現し、Sora（OpenAI）も物理シミュレーション能力を持つ動画生成モデルとしてワールドモデルの文脈で注目される。2025年現在、NVIDIA Cosmos等の大規模ワールドファウンデーションモデルが登場し、自動運転シミュレーション・ロボティクス・ゲームエンジン統合等への応用が本格化している。ワールドモデルは汎用人工知能（AGI）への道筋においても重要な構成要素と位置づけられ、LeCunのJEPA（Joint Embedding Predictive Architecture）等の理論的枠組みとも結びついている。物理世界の理解と予測という根源的課題に取り組む点で、生成AIの中でも特に長期的なインパクトが期待される研究領域である。", "keywords": ["world model", "physics simulation", "environment prediction", "game engine", "Genie"], "color": "#EC4899", "size": 12.0, "degree": 4, "related": [{"id": "t_04_02_01_sora", "name": "Sora", "strength": "strong"}, {"id": "t_04_02_02_veo", "name": "Veo / Veo 3 / Veo 3.1", "strength": "strong"}, {"id": "t_04_06_01_text_to_3d", "name": "3D生成・テクスチャ生成", "strength": "medium"}, {"id": "t_04_02_05_video_editing", "name": "動画編集・モーション転写", "strength": "weak"}]}, {"id": "t_05_01_01_react", "label": "ReAct", "title": "ReAct", "category": "AIエージェント", "subcategory": "エージェントアーキテクチャ", "description": "推論（Reasoning）と行動（Acting）を交互に行うエージェントアーキテクチャ。LLMが「Thought → Action → Observation」のループを繰り返し、思考過程を自然言語で言語化しながらツール呼び出しや情報取得を実行する。2022年にYaoらがプリンストン大学・Googleの共同研究として発表し、従来のCoTやAct-onlyアプローチを統合した点が画期的であった。ReActパターンはLangChain・LlamaIndex・Semantic Kernelなど主要フレームワークの基盤パターンとなり、2025年現在もほぼすべてのエージェントシステムの根幹をなしている。実用面ではカスタマーサポート、データ分析、コード生成など幅広いタスクに適用され、エージェントの透明性と制御性を両立する標準的な設計手法として定着している。", "keywords": ["ReAct", "reasoning", "acting", "thought-action-observation", "agent loop"], "color": "#14B8A6", "siz ": [{"id": "t_05_01_01_react", "name": "ReAct", "strength": "strong"}, {"id": "t_05_04_02_tree_of_thought", "name": "Tree / Graph of Thought", "strength": "strong"}, {"id": "t_05_04_03_gpt_5", "name": "推論モデル (o1/o3系)", "strength": "strong"}, {"id": "t_05_04_04_task_decomposition", "name": "タスク分解・計画", "strength": "medium"}, {"id": "t_05_02_04_debate_framework", "name": "議論フレームワーク", "strength": "weak"}]}, {"id": "t_05_04_02_tree_of_thought", "label": "Tree / Graph of Thought", "title": "Tree / Graph of Thought", "category": "AIエージェント", "subcategory": "推論・計画", "description": "推論過程を木構造やグラフ構造で探索し、最適な思考パスを発見する手法群。Tree-of-Thought（ToT）は推論の各ステップで複数の候補を分岐させ、評価関数（LLM自身や外部評価器）で有望なパスを選択してBFS/DFSで探索する。Graph-of-Thought（GoT）はToTをさらに一般化し、DAG（有向非巡回グラフ）構造で思考の統合・変換・洗練を可能にする。2023年にYaoら（プリンストン大学）がToTを、Besta ら（ETH Zurich）がGoTをそれぞれ提案し、Game of 24やクリエイティブライティングなどで単純なCoTを大きく上回る成果を示した。2025年にはLATS（Language Agent Tree Search）やRAP（Reasoning via Planning）など探索ベースの推論がさらに発展し、推論モデルとの融合も研究されている。複雑な計画立案、パズル解決、戦略的意思決定など、探索と評価を必要とする高度な推論タスクに適用される。", "keywords": ["Tree-of-Thought", "Graph-of-Thought", "ToT", "GoT", "search", "branching"], "color": "#14B8A6", "size": 10.7, "degree": 3, "related": [{"id": "t_05_04_01_chain_of_thought", "name": "Chain-of-Thought", "strength": "strong"}, {"id": "t_05_01_03_reflexion", "name": "Reflexion / LATS", "strength": "medium"}, {"id": "t_05_01_03_reflexion", "name": "Reflexion / LATS", "strength": "medium"}, {"id": "t_05_04_03_gpt_5", "name": "推論モデル (o1/o3系)", "strength": "medium"}]}, {"id": "t_05_04_03_gpt_5", "label": "推論モデル (o1/o3系)", "title": "推論モデル (o1/o3系)", "category": "AIエージェント", "subcategory": "推論・計画", "description": "テスト時計算（Test-time Compute）を大量に投入し、推論精度を飛躍的に高めるモデル群。内部的に長い思考チェーンを生成し、自己検証・バックトラック・複数解の比較を行うことで、数学・コーディング・科学推論などの難問に対して高い正答率を実現する。OpenAIが2024年9月にo1を公開し「推論スケーリング則（Inference Scaling Law）」の実証として注目され、2025年にはGPT-5、2026年初頭にはGPT-5.2まで進化し、推論モデルがフラッグシップに統合された。AnthropicはExtended Thinkingを搭載したClaude Opus 4.5（2025年）、Opus 4.6（2026年）を投入し、SWE-bench Verifiedで80%台に到達  "color": "#3B82F6", "size": 16.0, "degree": 7, "related": [{"id": "t_07_04_02_nvidia_b200", "name": "GPU/TPU/AIアクセラレータ", "strength": "strong"}, {"id": "t_07_03_03_triton_inference_server", "name": "推論サーバー基盤", "strength": "strong"}, {"id": "t_07_03_04_quantization", "name": "量子化技術", "strength": "strong"}, {"id": "t_07_03_02_vllm", "name": "vLLM", "strength": "medium"}]}, {"id": "t_07_03_02_vllm", "label": "vLLM", "title": "vLLM", "category": "インフラ/MLOps", "subcategory": "モデルサービング/効率化", "description": "PagedAttentionを導入した高スループットLLM推論エンジンであり、長らくOSSモデルのサービングにおけるデファクトスタンダードとして君臨してきた。PagedAttentionはOSの仮想メモリ管理に着想を得たKVキャッシュ管理手法で、メモリの断片化を解消しバッチ処理の効率を劇的に改善する。2023年にUC BerkeleyのSky Computing Labから発表され、その革新的なメモリ管理手法により瞬く間に広く採用された。2026年現在は純粋なスループット首位の座は SGLang（RadixAttention）や LMDeploy に移行しており、vLLM はエコシステムの広さと汎用性で第一選択肢の位置を維持しつつ、V1 engine への全面刷新、Disaggregated Prefill/Decode（プリフィル・デコード分離）、Multi-step Scheduling、強化された Prefix Caching、マルチモーダルモデル対応、構造化出力、分散推論のスケールアウト等で巻き返しを図っている。OpenAI互換APIを標準で提供し、既存のOpenAI SDKベースのアプリケーションからの移行が容易である点、Llama、Mistral、Qwen等の主要OSSモデル全てに即日対応する追従の速さが強みであり、企業のプライベートLLMデプロイメントに不可欠なツールであり続けている。", "keywords": ["vLLM", "PagedAttention", "V1 engine", "Disaggregated Prefill Decode", "high throughput", "inference serving", "OpenAI compatible"], "color": "#3B82F6", "size": 17.3, "degree": 8, "related": [{"id": "t_07_04_02_nvidia_b200", "name": "GPU/TPU/AIアクセラレータ", "strength": "strong"}, {"id": "t_07_03_01_tensorrt_llm", "name": "TensorRT-LLM", "strength": "medium"}, {"id": "t_07_03_04_quantization", "name": "量子化技術", "strength": "medium"}, {"id": "t_07_03_03_triton_inference_server", "name": "推論サーバー基盤", "strength": "medium"}, {"id": "t_07_04_04_aws_sagemaker", "name": "クラウドAIプラットフォーム", "strength": "medium"}]}, {"id": "t_07_03_03_triton_inference_server", "label": "推論サーバー基盤", "title": "推論サーバー基盤", "category": "インフラ/MLOps", "subcategory": "モデルサービング/効率化", "description": "Triton Inference Server（NVIDIA）、KServe（Kubernetes-native）、ONNX Runtime、BentoML、SGLang、TGI（Text Generation Inference, Hugging Face）等の推論サーバー群であり、MLモデルおよびLLMを本番環境で安定的に提供するためのインフラ基盤である。マルチモデル同時サービング、動的バッチング、モデルバージョニング、A/Bテスト、カナリアデプロイ等の本番運用に必要な機能を提供する。2018年頃にTensorFlow ServingやTritonが登場し、その後KServe（旧KFServing）やBentoML等がKubernetesエコシステムとの統合を強化してきた。LLM 時代に入ると LLM 特化サーバーが主役となり、Hugging Face の TGI が早期から普及した後、2025-2026 年は LMSYS（Berkeley/Stanford）発の SGLang が RadixAttention とフロントエンド DSL の組み合わせで最大級のシェアを獲得する主要プレーヤーとなっている。GPUの動的割り当て・共有（MIG/MPS対応）、サーバーレス推論、マルチアクセラレータ対応、Disaggregated Prefill/Decode 構成、KV キャッシュのリモート共有等が主要トレンドである。Kubernetes上での大規模展開を支援し、オートスケーリングやヘルスチェックによる高可用性を実現する。", "keywords": ["Triton Inference Server", "KServe", "ONNX Runtime", "BentoML", "SGLang", "TGI", "model serving", "Kubernetes"], "color": "#3B82F6", "size": 17.3, "degree": 8, "related": [{"id": "t_07_03_01_tensorrt_llm", "name": "TensorRT-LLM", "strength": "strong"}, {"id": "t_07_04_04_aws_sagemaker", "name": "クラウドAIプラットフォーム", "strength": "strong"}, {"id": "t_07_01_02_feature_store", "name": "Feature Store", "strength": "medium"}, {"id": "t_07_03_02_vllm", "name": "vLLM", "strength": "medium"}, {"id": "t_07_05_05_ml_ci_cd", "name": "ML CI/CD/モニタリング", "strength": "medium"}, {"id": "t_07_05_05_ml_ci_cd", "name": "ML CI/CD/モニタリング", "strength": "medium"}, {"id": "t_07_05_03_guardrails", "name": "ガードレール/コスト最適化", "strength": "weak"}]}, {"id": "t_07_03_04_quantization", "label": "量子化技術", "title": "量子化技術", "category": "インフラ/MLOps", "subcategory": "モデルサービング/効率化", "description": "モデルの重みや活性化関数の数値精度を下げることでモデルサイズと計算コストを削減する技術であり、GPTQ、AWQ、GGUF（llama.cpp）、SqueezeLLM、QuIP#等の手法が代表的である。Post-Training Quantization（PTQ）はキャリブレーションデータのみで量子化を行い、Quantization-Aware Training（QAT）は学習中に量子化を考慮して精度劣化を最小化する。量子化の歴史は深層学習の初期に遡るが、LLM時代に入り2023年以降はINT4/INT3レベルの極端な低ビット量子化が実用化された。2025年現在、FP8量子化（H100/B200ネイティブサポート）、FP4量子化、1-bit LLM（BitNet）、KVキャッシュの選択的量子化、MoEモデル向けのExpert単位量子化が最先端のトレンドである。エッジデバイスやラップトップでの70B以上のLLM実行を可能にし、推論コストの大幅削減に貢献する。GGUF形式はllama.cppエコシステムとの親和性が高く、個人利用からエンタープライズまで幅広く活用されている。", "keywords": ["quantization", "GPTQ", "AWQ", "GGUF", "I "}]}, {"id": "t_07_06_04_mcp", "label": "MCP/A2Aプロトコル", "title": "MCP/A2Aプロトコル", "category": "インフラ/MLOps", "subcategory": "オーケストレーション", "description": "Model Context Protocol（MCP）やAgent-to-Agent（A2A）プロトコル等、AIエージェントとツール・外部サービス・他のエージェント間の標準通信規約を定める新興技術である。MCPはAnthropicが2024年11月に発表したオープンプロトコルで、LLMがツールやデータソースにアクセスするためのJSON-RPCベースの標準インターフェースを提供する。2026年現在、MCP は累計約9,700万ダウンロードを記録し、Anthropic Claude のみならず OpenAI、Google、Microsoft も公式採用を表明、Cursor・VS Code・Copilot 等の主要AIツールが MCP クライアントとして対応し、GitHub・Slack・各種 DB 等の MCP サーバーが大量に公開されている事実上の業界標準となっている。A2A（Agent-to-Agent Protocol）は2025年4月に Google が発表し、異なるベンダーのエージェント間の相互運用性を確保するプロトコルで、2025年6月に Linux Foundation に寄贈されてベンダー中立化が進んだ。さらに IBM の ACP（Agent Communication Protocol）と Cisco/AWS/Microsoft/Salesforce 等が推進する AGNTCY（Internet of Agents）構想が A2A と統合され、エージェント相互運用の標準化が加速している。ツール呼び出しの標準化、コンテキスト共有プロトコル、マルチエージェント間の委任・協調メカニズムが技術的焦点であり、MCP・A2A・AGNTCY の三層がそれぞれツール接続層・エージェント間通信層・エコシステム相互運用層として AI 時代のインターフェース層を形成しつつある。", "keywords": ["MCP", "Model Context Protocol", "A2A", "AGNTCY", "ACP", "Linux Foundation", "agent-to-agent", "interoperability", "tool use"], "color": "#3B82F6", "size": 12.0, "degree": 4, "related": [{"id": "t_07_06_05_agntcy", "name": "AGNTCY / Internet of Agents", "strength": "strong"}, {"id": "t_07_06_01_langchain", "name": "LangChain", "strength": "medium"}, {"id": "t_07_06_02_llamaindex", "name": "LlamaIndex", "strength": "medium"}, {"id": "t_07_06_03_semantic_kernel", "name": "Semantic Kernel/ワークフローエンジン", "strength": "medium"}]}, {"id": "t_07_06_05_agntcy", "label": "AGNTCY / Internet of Agents", "title": "AGNTCY / Internet of Agents", "category": "インフラ/MLOps", "subcategory": "オーケストレーション", "description": "Cisco・AWS・Microsoft・Salesforce 等が 2025 年に共同で立ち上げた「Internet of Agents」構想を推進するオープン協調イニシアチブであり、ベンダー横断のエージェント発見・登録・相互運用・観測のためのオープンスタックを定義する。MCP（ツール接続層）と A2A（エージェント間通信プロトコル）に対する第 3 極として、それらをエコシステム全体で運用可能にする「相互運用層・ガバナンス層」を担う位置づけにある。Agent Directory（ACP との統合により、エージェント・スキル・MCP サーバー等のメタデータを発見・登録する仕組み）、Agent Gateway、Observability コンポーネント、信頼・ID・課金のための共通仕様が中心要素であり、Linux Foundation 配下でガバナンスされる。2026 年時点では参加企業が 80 社を超え、エンタープライズの「マルチベンダー・マルチエージェント環境」を前提とする AI システム設計の基盤として急速に存在感を高めている。MCP/A2A と組み合わせることで、社内外の数百のエージェントとツールを単一の名前空間で安全に協調させる構想が現実味を帯びてきている。", "keywords": ["AGNTCY", "Internet of Agents", "Agent Directory", "Agent Gateway", "Cisco", "multi-agent interoperability"], "color": "#3B82F6", "size": 10.7, "degree": 3, "related": [{"id": "t_07_06_04_mcp", "name": "MCP/A2Aプロトコル", "strength": "strong"}, {"id": "t_07_06_01_langchain", "name": "LangChain", "strength": "medium"}, {"id": "t_07_06_03_semantic_kernel", "name": "Semantic Kernel/ワークフローエンジン", "strength": "medium"}]}, {"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "label": "RLHF", "title": "RLHF", "category": "安全性/倫理", "subcategory": "アライメント", "description": "人間のフィードバックを用いた強化学習（RLHF）は、モデルの出力を人間の選好に整合させるためのアライメント手法である。まず人間の比較判断から報酬モデルを学習し、その報酬信号を用いてPPO（Proximal Policy Optimization）等の強化学習アルゴリズムで言語モデルの方策を最適化する。2017年頃のOpenAIやDeepMindの研究に端を発し、2022年のInstructGPT・ChatGPTの成功によって一気に主流技術となった。2025年現在ではDPOやKTOなど報酬モデル不要の代替手法が台頭しつつも、RLHFは依然としてGPT-4やClaude等の主要モデルの学習パイプラインに組み込まれている。対話型AI、コード生成、要約など幅広いタスクで安全性と有用性を両立するための基盤技術として、産業界で不可欠な位置を占めている。", "keywords": ["Reinforcement Learning from Human Feedback", "reward model", "PPO"], "color": "#EF4444", "size": 17.3, "degree": 8, "related": [{"id": "t_08_01_02_constitutional_ai", "name": "Constitutional AI", "strength": "strong"}, {"id": "t_08_01_03_direct_preference_optimization", "name": "DPO/RLAIF", "strength": "strong"}, {"id": "t_08_01_04_reward_modeling", "name": "報酬モデリング", "strength": "strong"}, {"id": "t_08_01_04_reward_modeling", "name": "報酬モデリング", "strength": "strong"}, {"id": "t_08_03_01_jailbreak", "name": "ジェイルブレイク", "strength": "medium"}, {"id": "t_08_06_01_mmlu", "name": "安全性ベンチマーク", "strength": "medium"}, {"id": "t_08_06_04_agi_risk", "name": "AGIリスク/存在リスク", "strength": "weak"}, {"id": "t_08_02_03_uncertainty_estimation", "name": "知識の境界認識", "strength": "weak"}]}, {"id": "t_08_01_02_constitutional_ai", "label": "Constitutional AI", "title": "Constitutional AI", "category": "安全性/倫理", "subcategory": "アライメント", "description": "Constitutional AI（CAI）はAnthropicが2022年に提案した手法で、AIモデルに一連の憲法的原則（Constitutional Principles）を与え、自己批判と自己修正のサイクルを通じて有害出力を抑制する。具体的には、モデル自身が生成した応答を原則に照らして評価・改善し、その改善データを用いてRLAIF（AI Feedback による強化学習）を行う。人間によるラベリング負荷を大幅に軽減しつつ、安全性と有用性を高い水準で両立できる点が画期的である。2025年時点ではCAIの考え方はAnthropicのClaudeシリーズに深く組み込まれ、他社も類似のアプローチを採用し始めている。さらに2024年12月にOpenAIがo1/o3向けに発表したDeliberative Alignmentは、CAIの後継的位置づけと言える手法であり、安全仕様（safety specifications）を学習時に暗黙化するのではなく、推論時にChain-of-Thoughtで明示的に参照させて方針判断を行う。これは推論モデル時代のアライメントの新しいパラダイムであり、CAIと並ぶスケーラブルなアライメント手法として、人間の監視が困難な超知能レベルのAIへの対応策としても注目されている。", "keywords": ["Constitutional AI", "CAI", "self-critique", "Anthropic", "Deliberative Alignment", "OpenAI o1/o3", "safety specifications"], "color": "#EF4444", "size": 20.0, "degree": 10, "related": [{"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "strong"}, {"id": "t_08_01_03_direct_preference_optimization", "name": "DPO/RLAIF", "strength": "medium"}, {"id": "t_08_03_01_jailbreak", "name": "ジェイルブレイク", "strength": "medium"}, {"id": "t_08_06_04_agi_risk", "name": "AGIリスク/存在リスク", "strength": "weak"}, {"id": "t_08_06_02_red_teaming", "name": "Red Teaming", "strength": "weak"}]}, {"id": "t_08_01_03_direct_preference_optimization", "label": "DPO/RLAIF", "title": "DPO/RLAIF", "category": "安全性/倫理", "subcategory": "アライメント", "description": "Direct Preference Optimization（DPO）は、報酬モデルを明示的に学習せず、人間の選好データから直接言語モデルの方策を最適化する手法であり、2023年にStanford大学のRafailovらが提案した。RLHFの複雑なRL学習ループを回避し、単純な分類損失で同等以上の性能を達成できる点が大きな利点である。RLAIFはAIモデル自身のフィードバックを報酬信号として活用する手法で、人間ラベルのコスト削減を実現する。2025年にはDPOの発展形であるIPO、KTO、ORPO、SimPOなど多数の派生手法が登場し、選好最適化の分野は急速に多様化している。さらに2025年から2026年にかけての主流は、DeepSeek-R1の登場で一気に普及したGRPO（Group Relative Policy Optimization）と、検証可能な正解信号を直接報酬として用いるRLVR（Reinforcement Learning with Verifiable Rewards）である。ByteDanceのDAPOも含め、これらは推論モデル時代のpost-trainingの中核を成し、数学・コード・科学推論タスクで報酬モデル不要かつ高効率な学習を実現している。これらの手法はオープンソースLLMの学習パイプラインで広く採用され、効率的なアライメントの民主化に大きく貢献している。", "keywords": ["Direct Preference Optimization", "RLAIF", "preference learning", "GRPO", "RLVR", "DAPO", "DeepSeek-R1", "reasoning model post-training"], "color": "#EF4444", "size": 10.7, "degree": 3, "related": [{"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "strong"}, {"id": "t_08_01_02_constitutional_ai", "name": "Constitutional AI", "strength": "medium"}, {"id": "t_08_01_04_reward_modeling", "name": "報酬モデリング", "strength": "medium"}]}, {"id": "t_08_01_04_reward_modeling", "label": "報酬モデリング", "title": "報酬モデリング", "category": "安全性/倫理", "subcategory": "アライメント", "description": "報酬モデリングは、人間の選好判断を模倣する報酬関数を機械学習で獲得し、強化学習の報酬信号として活用する技術である。典型的にはペアワイズ比較データからBradley-Terryモデル等を用いて報酬モデルを訓練し、生成モデルの出力品質を数値的に評価する。主要課題として、報酬ハッキング（モデルが報酬を不正に最大化する行動を学習する現象）やスケーラブルな監視（人間が評価困難な高度なタスクへの対応）がある。2025年には、プロセス報酬モデル（PRM）が数学的推論の段階的評価に成功し、合成データによる報酬モデル学習や、複数の報酬モデルのアンサンブルによるロバスト性向上が活発に研究されている。RLHF・DPO双方のパイプラインで中核的な役割を果たし、AIの出力品質管理の要となっている。", "keywords": ["reward modeling", "reward hacking", "scalable oversight"], "color": "#EF4444", "size": 9.3, "degree": 2, "related": [{"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "strong"}, {"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "strong"}, {"id": "t_08_01_03_direct_preference_optimization", "name": "DPO/RLAIF", "strength": "medium"}]}, {"id": "t_08_01_05_deliberative_alignment", "label": "Deliberative Alignment", "title": "Deliberative Alignment", "category": "安全性/倫理", "subcategory": "アライメント", "description": "Deliberative Alignmentは、OpenAIが2024年12月に発表した推論モデル時代向けの新しいアライメント手法であり、o1およびo3シリーズに実装されている。従来のRLHFやConstitutional AIが安全方針を学習データや報酬モデルを通じて暗黙的にモデル重みへ内在化させるのに対し、Deliberative Alignmentでは明示的な安全仕様（safety specifications）の自然言語テキストをモデルに学習させ、推論時にChain-of-Thought（CoT）の中で当該仕様を直接参照・適用させる。これにより、未知のジェイルブレイクや微妙な境界事例に対しても、モデルが明示的に方針判断を行えるようになり、過剰拒否 ium"}, {"id": "t_08_05_04_eu_ai_act", "name": "EU AI Act", "strength": "medium"}, {"id": "t_08_01_02_constitutional_ai", "name": "Constitutional AI", "strength": "weak"}, {"id": "t_08_01_05_deliberative_alignment", "name": "Deliberative Alignment", "strength": "weak"}]}, {"id": "t_08_02_01_factuality_verification", "label": "事実性検証", "title": "事実性検証", "category": "安全性/倫理", "subcategory": "ハルシネーション対策", "description": "事実性検証は、AIモデルの出力が事実に即しているかを外部知識源やデータベースと照合して検証する技術である。主なアプローチとして、検索拡張生成（RAG）との統合、自然言語推論（NLI）ベースの整合性チェック、知識グラフとの照合、およびLLM自身による自己検証がある。2020年頃からLLMのハルシネーション問題が顕在化し、FActScoreやFaithfulnessスコアなどの評価指標が整備されてきた。2025年には、リアルタイムファクトチェックパイプラインの実用化が進み、マルチモーダル（画像・動画を含む）コンテンツの事実性検証にも研究が拡大している。医療診断支援、ニュース生成、法律文書作成など、高い正確性が求められる応用領域での信頼性確保に不可欠な技術である。", "keywords": ["factuality verification", "fact-checking", "hallucination detection"], "color": "#EF4444", "size": 10.7, "degree": 3, "related": [{"id": "t_08_02_02_grounding", "name": "Grounding/出典付き回答", "strength": "strong"}, {"id": "t_08_02_02_grounding", "name": "Grounding/出典付き回答", "strength": "strong"}, {"id": "t_08_02_03_uncertainty_estimation", "name": "知識の境界認識", "strength": "medium"}, {"id": "t_08_06_01_mmlu", "name": "安全性ベンチマーク", "strength": "medium"}]}, {"id": "t_08_02_02_grounding", "label": "Grounding/出典付き回答", "title": "Grounding/出典付き回答", "category": "安全性/倫理", "subcategory": "ハルシネーション対策", "description": "Grounding（グラウンディング）は、モデルの回答を外部の信頼できる文書やデータベースに根拠づけ、出典を明示的に提示する技術である。主要な手法として、検索拡張生成（RAG）、出典付き生成（Attributed Generation）、および引用箇所の自動抽出がある。Google、Microsoft、Perplexityなどが検索連動型AIで積極的に採用し、2023年以降のLLMサービスでは標準機能となりつつある。2025年にはマルチホップ推論における段階的グラウンディングや、引用の正確性を自動検証するシステムが進化し、情報源の信頼度スコアリングも実用化されている。企業向けRAGシステム、学術論文執筆支援、カスタマーサポートなど、回答の根拠透明性が求められるあらゆる場面で中核的な役割を果たしている。", "keywords": ["grounding", "attributed generation", "citation", "RAG"], "color": "#EF4444", "size": 9.3, "degree": 2, "related": [{"id": "t_08_02_01_factuality_verification", "name": "事実性検証", "strength": "strong"}, {"id": "t_08_02_01_factuality_verification", "name": "事実性検証", "strength": "strong"}, {"id": "t_08_02_03_uncertainty_estimation", "name": "知識の境界認識", "strength": "medium"}]}, {"id": "t_08_02_03_uncertainty_estimation", "label": "知識の境界認識", "title": "知識の境界認識", "category": "安全性/倫理", "subcategory": "ハルシネーション対策", "description": "知識の境界認識は、AIモデルが自身の知識の限界や不確実性を正しく把握し、確信度が低い場合に「わからない」と適切に回答する能力を指す。技術的には、キャリブレーション（予測確率と実際の正解率の整合性）、不確実性推定（エントロピーやMCドロップアウト等）、および抑止機構（abstention mechanism）が主要手法である。LLMが流暢だが誤った回答を自信満々に生成する問題は2022年頃から深刻化し、「知らないことを知る」能力の研究が急速に進展した。2025年には、内部表現の不確実性をプローブする手法や、思考連鎖（Chain-of-Thought）中に自己検証ステップを挿入する技術が成果を上げている。医療・法律・金融など高リスク領域でのAI活用において、過信による誤情報提供を防ぐための重要な安全機構である。", "keywords": ["uncertainty estimation", "calibration", "know-what-you-dont-know"], "color": "#EF4444", "size": 12.0, "degree": 4, "related": [{"id": "t_08_02_01_factuality_verification", "name": "事実性検証", "strength": "medium"}, {"id": "t_08_02_02_grounding", "name": "Grounding/出典付き回答", "strength": "medium"}, {"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "weak"}, {"id": "t_08_04_02_attention_visualization", "name": "Attention可視化/反事実説明", "strength": "weak"}]}, {"id": "t_08_03_01_jailbreak", "label": "ジェイルブレイク", "title": "ジェイルブレイク", "category": "安全性/倫理", "subcategory": "敵対的攻撃/セキュリティ", "description": "ジェイルブレイクは、AIモデルに実装された安全ガードレールを巧みなプロンプト操作で回避し、本来拒否すべき有害な出力を引き出す攻撃手法の総称である。代表的な手法として、多言語攻撃（低リソース言語への翻訳）、ロールプレイ誘導（DAN等）、Base64等のエンコーディング攻撃、ペイロード分割、仮想シナリオ構築などがある。2023年のChatGPT普及とともにジェイルブレイク手法が急増し、攻撃と防御のいたちごっこが継続している。2025年にはマルチモーダルジェイルブレイク（画像・音声を利用した攻撃）や、自動化されたジェイルブレイク生成（GCG、AutoDANなど）が高度化し、防御側もRed Teamingの自動化やマルチレイヤー防御で対抗している。LLMの商用展開における最大のセキュリティ課題の一つとして、産学で活発な研究が続いている。", "keywords": ["jailbreak", "safety bypass", "guardrail evasion"], "color": "#EF4444", "size": 14.7, "degree": 6, "related": [{"id": "t_08_03_02_prompt_injection", "name": "プロンプトインジェクション", "strength": "strong"}, {"id": "t_08_06_02_red_teaming", "name": "Red Teaming", "strength": "strong"}, {"id": "t_08_01_02_constitutional_ai", "name": "Constitutional AI", "strength": "medium"}, {"id": "t_08_01_01_reinforcement_learning_from_human_feedback", "name": "RLHF", "strength": "medium"}, {"id": "t_08_03_03_data_poisoning", "name": "データポイズニング/バックドア", "strength": "weak"}]}, {"id": "t_08_03_02_prompt_injection", "label": "プロンプトインジェクション", "title": "プロンプトインジェクション", "category": "安全性/倫理", "subcategory": "敵対的攻撃/セキュリティ", "description": "プロンプトインジェクションは、外部データや入力テキストに悪意あるプロンプトを埋め込み、AIモデルの動作を攻撃者の意図通りに操作する攻撃手法である。直接的インジェクション（ユーザー入力に命令を混入）と間接的インジェクション（Webページやメール等の外部データに命令を埋め込む）の2種類がある。特にエージェント型AI（ツール使用・外部API呼び出しを行うLLM）において、間接的プロンプトインジェクションはデータ窃取や不正操作を引き起こす深刻な脅威となる。2025年には、サンドボックス化、入力サニタイズ、特権分離、信頼境界の明確化などの防御手法が体系化されつつも、完全な解決には至っていない。OWASPがLLMアプリケーションのTop 10脆弱性の第1位に挙げており、エンタープライズAI導入における最重要セキュリティ課題となっている。", "keywords": ["prompt injection", "indirect prompt injection", "data exfiltration"], "color": "#EF4444", "size": 10.7, "degree": 3, "related": [{"id": "t_08_03_01_jailbreak", "name": "ジェイルブレイク", "strength": "strong"}, {"id": "t_08_06_02_red_teaming", "name": "Red Teaming", "strength": "medium"}, {"id": "t_08_03_03_data_poisoning", "name": "データポイズニング/バックドア", "strength": "medium"}, {"id": "t_08_03_03_data_poisoning", "name": "データポイズニング/バックドア", "strength": "medium"}]}, {"id": "t_08_03_03_data_poisoning", "label": "データポイズニング/バックドア", "title": "データポイズニング/バックドア", "category": "安全性/倫理", "subcategory": "敵対的攻撃/セキュリティ", "description": "データポイズニングは、機械学習モデルの学習データに悪意あるサンプルを意図的に混入し、モデルに不正な動作やバイアスを埋め込む攻撃手法である。バックドア攻撃は特定のトリガーパターン（画像のパッチ、特定の単語列等）が入力に含まれた場合にのみ有害な出力を誘発する、より隠密性の高い亜種である。Web上のクローリングデータに依存する大規模言語モデルの学習において、データポイズニングの脅威は2023年以降ますます深刻化している。2025年には、学習データの出所追跡（Data Provenance）、ポイズニング検出アルゴリズム、クリーンデータによるファインチューニングでの浄化手法が進歩している。サプライチェーン攻撃の文脈でも重要視され、基盤モデルの信頼性を根本から脅かすリスクとして、学習データのキュレーションと検証プロセスの標準化が進められている。", "keywords": ["data poisoning", "backdoor attack", "trojan", "training data attack"], "color": "#EF4444", "size": 10.7, "degree": 3, "related": [{"id": "t_08_03_02_prompt_injection", "name": "プロンプトインジェクション", "strength": "medium"}, {"id": "t_ ": "t_08_06_02_red_teaming", "strength": "strong"}, {"from": "t_08_06_02_red_teaming", "to": "t_08_06_03_ai_watermarking", "strength": "weak"}, {"from": "t_08_06_03_ai_watermarking", "to": "t_08_06_04_agi_risk", "strength": "weak"}, {"from": "t_08_06_04_agi_risk", "to": "t_08_06_05_laws", "strength": "medium"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_06_02_red_teaming", "strength": "strong"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_06_01_mmlu", "strength": "strong"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_06_04_agi_risk", "strength": "medium"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_01_06_responsible_scaling_policy", "strength": "medium"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_05_06_ai_audit", "strength": "medium"}, {"from": "t_08_06_06_frontier_model_evaluations", "to": "t_08_06_07_scheming", "strength": "weak"}, {"from": "t_08_06_07_scheming", "to": "t_08_06_04_agi_risk", "strength": "strong"}, {"from": "t_08_06_07_scheming", "to": "t_08_04_03_mechanistic_interpretability", "strength": "medium"}, {"from": "t_08_06_07_scheming", "to": "t_08_06_02_red_teaming", "strength": "medium"}, {"from": "t_08_06_07_scheming", "to": "t_08_01_06_responsible_scaling_policy", "strength": "medium"}, {"from": "t_08_06_07_scheming", "to": "t_08_01_02_constitutional_ai", "strength": "weak"}, {"from": "t_08_06_08_ai_welfare", "to": "t_08_06_04_agi_risk", "strength": "medium"}, {"from": "t_08_06_08_ai_welfare", "to": "t_08_01_02_constitutional_ai", "strength": "medium"}, {"from": "t_08_06_08_ai_welfare", "to": "t_08_06_05_laws", "strength": "weak"}, {"from": "t_08_06_08_ai_welfare", "to": "t_08_05_05_japan_ai_guidelines", "strength": "weak"}], "categories": ["基盤技術", "自然言語処理", "コンピュータビジョン", "生成AI", "AIエージェント", "応用分野", "インフラ/MLOps", "安全性/倫理"], "colors": {"基盤技術": "#4A6CF7", "自然言語処理": "#A855F7", "コンピュータビジョン": "#F97316", "生成AI": "#EC4899", "AIエージェント": "#14B8A6", "応用分野": "#EAB308" const catFilters = document.getElementById('cat-filters');
const catState = {};
kgData.categories.forEach(cat => {
  catState[cat] = true;
  const label = document.createElement('label');
  label.className = 'filter-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = true;
  cb.addEventListener('change', () => { catState[cat] = cb.checked; applyFilters(); });
  const sw = document.createElement('span');
  sw.className = 'swatch';
  sw.style.background = kgData.colors[cat];
  const txt = document.createElement('span');
  txt.textContent = cat;
  label.appendChild(cb); label.appendChild(sw); label.appendChild(txt);
  catFilters.appendChild(label);
});

const edgeState = { strong: true, medium: true, weak: true };
document.querySelectorAll('#edge-filters input').forEach(cb => {
  cb.addEventListener('change', () => { edgeState[cb.dataset.strength] = cb.checked; applyFilters(); });
});

const edgeStyle = {
  strong: { width: 3, color: '#ffffff' },
  medium: { width: 2, color: '#888888' },
  weak:   { width: 1, color: '#555555' },
};

const visNodes = kgData.nodes.map(n => ({
  id: n.id,
  label: n.label,
  title: n.label,
  color: { background: n.color, border: n.color, highlight: { background: '#ffffff', border: n.color } },
  size: n.size,
  font: { color: '#e8ecf5', size: 11, face: '"Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif', strokeWidth: 3, strokeColor: '#0a0e1a' },
  _data: n,
}));

const visEdges = kgData.edges.map((e, i) => ({
  id: 'e' + i,
  from: e.from,
  to: e.to,
  width: edgeStyle[e.strength].width,
  color: { color: edgeStyle[e.strength].color, opacity: 0.5 },
  _strength: e.strength,
}));

const nodesDS = new vis.DataSet(visNodes);
const edgesDS = new vis.DataSet(visEdges);
const allNodeIds = visNodes.map(n => n.id);
const nodeMap = {};
visNodes.forEach(n => { nodeMap[n.id] = n; });

const container = document.getElementById('network');
const options = {
  nodes: { shape: 'dot', borderWidth: 2 },
  edges: { smooth: { enabled: true, type: 'continuous', roundness: 0.4 } },
  interaction: { hover: true, tooltipDelay: 120, zoomView: true, dragView: true },
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 100, springConstant: 0.08, damping: 0.4, avoidOverlap: 0.5 },
    stabilization: { iterations: 250, updateInterval: 25 },
  },
};
const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, options);

container.addEventListener('wheel', e => e.preventDefault(), { passive: false });

function applyFilters() {
  const visibleNodeIds = new Set();
  visNodes.forEach(n => {
    if (catState[n._data.category]) visibleNodeIds.add(n.id);
  });
  nodesDS.update(visNodes.map(n => ({ id: n.id, hidden: !visibleNodeIds.has(n.id) })));
  edgesDS.update(visEdges.map(e => ({
    id: e.id,
    hidden: !(visibleNodeIds.has(e.from) && visibleNodeIds.has(e.to) && edgeState[e._strength]),
  })));
  updateStats(visibleNodeIds);
}

function updateStats(visibleSet) {
  const ns = visibleSet || new Set(allNodeIds);
  let nc = ns.size;
  let ec = 0;
  visEdges.forEach(e => {
    if (ns.has(e.from) && ns.has(e.to) && edgeState[e._strength]) ec++;
  });
  document.getElementById('stats').textContent = '表示中: ' + nc + ' ノード / ' + ec + ' エッジ';
}

function makeBadge(text, bg, fg) {
  const s = document.createElement('span');
  s.className = 'badge';
  s.style.background = bg;
  s.style.color = fg;
  s.textContent = text;
  return s;
}

function makeLabel(text) {
  const d = document.createElement('div');
  d.className = 'label';
  d.textContent = text;
  return d;
}

function showDetail(id) {
  const n = nodeMap[id];
  if (!n) return;
  const d = n._data;
  const el = document.getElementById('detail');
  while (el.firstChild) el.removeChild(el.firstChild);

  el.appendChild(makeBadge(d.category, d.color, '#ffffff'));
  el.appendChild(makeBadge(d.subcategory, '#2a3550', '#e0e0e0'));

  const h = document.createElement('h2');
  h.textContent = d.label;
  el.appendChild(h);

  el.appendChild(makeLabel('説明'));
  const desc = document.createElement('div');
  desc.className = 'desc';
  desc.textContent = d.description || '';
  el.appendChild(desc);

  el.appendChild(makeLabel('キーワード'));
  const kwWrap = document.createElement('div');
  if ((d.keywords || []).length === 0) {
    const p = document.createElement('span');
    p.className = 'placeholder';
    p.textContent = 'なし';
    kwWrap.appendChild(p);
  } else {
    d.keywords.forEach(k => {
      const s = document.createElement('span');
      s.className = 'kw';
      s.textContent = k;
      kwWrap.appendChild(s);
    });
  }
  el.appendChild(kwWrap);

  el.appendChild(makeLabel('関連テーマ (' + (d.related || []).length + ')'));
  const relWrap = document.createElement('div');
  if ((d.related || []).length === 0) {
    const p = document.createElement('span');
    p.className = 'placeholder';
    p.textContent = 'なし';
    relWrap.appendChild(p);
  } else {
    d.related.forEach(r => {
      if (!nodeMap[r.id]) return;
      const item = document.createElement('div');
      item.className = 'related-item';
      const nm = document.createElement('span');
      nm.textContent = r.name;
      const st = document.createElement('span');
      st.className = 'strength strength-' + r.strength;
      st.textContent = r.strength;
      item.appendChild(nm);
      item.appendChild(st);
      item.addEventListener('click', () => {
        showDetail(r.id);
        network.focus(r.id, { scale: 1.2, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
        network.selectNodes([r.id]);
      });
      relWrap.appendChild(item);
    });
  }
  el.appendChild(relWrap);
}

network.on('click', params => {
  if (params.nodes && params.nodes.length > 0) showDetail(params.nodes[0]);
});

const searchEl = document.getElementById('search');
searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) {
    nodesDS.update(visNodes.map(n => ({ id: n.id, color: { background: n._data.color, border: n._data.color } })));
    return;
  }
  const matches = [];
  visNodes.forEach(n => {
    const d = n._data;
    const hay = (d.label + ' ' + d.subcategory + ' ' + (d.keywords || []).join(' ')).toLowerCase();
    if (hay.includes(q)) matches.push(n.id);
  });
  nodesDS.update(visNodes.map(n => {
    const hit = matches.includes(n.id);
    return {
      id: n.id,
      color: hit
        ? { background: '#ffffff', border: n._data.color }
        : { background: n._data.color, border: n._data.color, opacity: 0.25 },
    };
  }));
  if (matches.length > 0) {
    network.fit({ nodes: matches, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  }
});

document.getElementById('reset').addEventListener('click', () => {
  searchEl.value = '';
  Object.keys(catState).forEach(k => catState[k] = true);
  Object.keys(edgeState).forEach(k => edgeState[k] = true);
  document.querySelectorAll('.sidebar input[type=checkbox]').forEach(cb => cb.checked = true);
  nodesDS.update(visNodes.map(n => ({ id: n.id, hidden: false, color: { background: n._data.color, border: n._data.color } })));
  edgesDS.update(visEdges.map(e => ({ id: e.id, hidden: false })));
  network.fit({ animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
  updateStats();
});

network.once('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});

updateStats();

</script>
